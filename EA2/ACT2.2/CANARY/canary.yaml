### 1. SERVICE - Expone la Aplicación a Través del Load Balancer (ELB/ALB)
# Este Service dirige el tráfico a CUALQUIER Pod que tenga la etiqueta 'app: duoc-app'.
# Esto incluye tanto la versión Stable como la Canary.
apiVersion: v1
kind: Service
metadata:
  name: duoc-app-canary-service
  labels:
    app: duoc-app
spec:
  # 💡 CLAVE: Este selector apunta a ambos Deployments.
  selector:
    app: duoc-app 
  type: LoadBalancer 
  ports:
    - protocol: TCP
      port: 80         
      targetPort: 3000

---
### 2. DEPLOYMENT - Versión Estable (BLUE)
# Esta es la versión principal, recibiendo la mayoría del tráfico.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: duoc-app-stable-v1
  labels:
    app: duoc-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: duoc-app
      version: stable
  template:
    metadata:
      labels:
        app: duoc-app
        version: stable # Etiqueta de versión
    spec:
      containers:
      - name: node-app-container
        image: 368336158612.dkr.ecr.us-east-1.amazonaws.com/duoc-lab:v1
        ports:
        - containerPort: 3000
        imagePullPolicy: Always

---
### 3. DEPLOYMENT - Versión Canary (GREEN)
# Esta es la nueva versión, recibiendo una pequeña porción del tráfico para pruebas.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: duoc-app-canary-v2
  labels:
    app: duoc-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: duoc-app
      version: canary
  template:
    metadata:
      labels:
        app: duoc-app
        version: canary # Etiqueta de versión
    spec:
      containers:
      - name: node-app-container
        image: 368336158612.dkr.ecr.us-east-1.amazonaws.com/duoc-lab:v2
        ports:
        - containerPort: 3000
        imagePullPolicy: Always