name: Despliegue EKS - Estrategias de Rollout

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      strategy:
        description: 'Estrategia a Ejecutar (Debe ser: rolling-update, recreate, blue-green, o canary)'
        required: true
        type: string
        default: 'rolling-update' # Opciones [rolling-update, recreate, canary, blue-green]
      eks_cluster_name:
        description: 'Nombre del Cluster EKS (duoc-eks-cluster-cli)'
        required: true
        default: 'duoc-eks-cluster-cli'
      aws_region:
        description: 'Región de AWS'
        required: true
        default: 'us-east-1'

jobs:
  deploy-strategy:
    runs-on: ubuntu-latest
    permissions:
      contents: read 
    
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Configurar Credenciales AWS (AK/SK/Token)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ github.event.inputs.aws_region }}

      # Corrección: Uso del comando nativo de AWS CLI para actualizar el kubeconfig
      - name: Configurar Kubectl para EKS
        run: |
          aws eks update-kubeconfig --region ${{ github.event.inputs.aws_region }} --name ${{ github.event.inputs.eks_cluster_name }}
      
      # -----------------------------------------------------------
      # 2.1. 🔄 ROLLING UPDATE (Actualización gradual)
      # -----------------------------------------------------------
      - name: 🔄 Ejecutar Rolling Update (Default)
        if: ${{ github.event.inputs.strategy == 'rolling-update' }}
        run: |
          echo "Aplicando YAML para Rolling Update (Actualización gradual)..."
          kubectl apply -f EA2/ACT2.2/ROLLING-UPDATE/deployment.yaml
          kubectl rollout status deployment/duoc-app-rolling --timeout=300s
          echo "✅ Rolling Update completado."

      # -----------------------------------------------------------
      # 2.2. ❌ RECREATE (All-in-once)
      # -----------------------------------------------------------
      - name: ❌ Ejecutar Recreate (All-in-once)
        if: ${{ github.event.inputs.strategy == 'recreate' }}
        run: |
          echo "Aplicando YAML para Recreate (All-in-once)..."
          kubectl apply -f EA2/ACT2.2/ALL-IN-ONCE/deployment.yaml
          kubectl rollout status deployment/duoc-app-recreate --timeout=300s
          echo "✅ Recreate completado."
          
      # -----------------------------------------------------------
      # 2.3. 🟦 BLUE/GREEN (Switch atómico)
      # -----------------------------------------------------------
      - name: 🟦 Ejecutar Blue/Green (kubectl patch)
        if: ${{ github.event.inputs.strategy == 'blue-green' }}
        run: |
          echo "1. Desplegando el entorno GREEN (Inactivo)..."
          kubectl apply -f EA2/ACT2.2/BLUE-GREEN/deployment.yaml
          kubectl rollout status deployment/duoc-app-green --timeout=300s
          echo "✅ Rollout de GREEN completado."
          
          echo "2. Ventana de Prueba/Observación (120 segundos)..."
          sleep 120
          echo "✅ Prueba simulada completada."
          
          echo "3. Ejecutando el Switch de tráfico: BLUE -> GREEN..."
          kubectl patch service duoc-app-bg-service -p '{"spec": {"selector": {"version": "green"}}}'
          echo "✅ Switch de tráfico completado."
          
      # -----------------------------------------------------------
      # 2.4. 🐥 CANARY (Promoción con Scale)
      # -----------------------------------------------------------
      - name: 🐥 Ejecutar Canary (kubectl scale)
        if: ${{ github.event.inputs.strategy == 'canary' }}
        run: |
          echo "1. Desplegando el entorno CANARY (10% de tráfico)..."
          kubectl apply -f EA2/ACT2.2/CANARY/deployment.yaml
          kubectl rollout status deployment/duoc-app-canary-v2 --timeout=300s
          echo "✅ Rollout de CANARY inicial completado."
          
          echo "2. Ventana de Prueba/Observación (120 segundos)..."
          sleep 120
          echo "✅ Prueba simulada completada."
          
          echo "3. PROMOCIÓN: Escalar V2 a 3 y V1 a 0..."
          kubectl scale deployment/duoc-app-canary-v2 --replicas=3
          kubectl scale deployment/duoc-app-stable-v1 --replicas=0
          
          echo "4. Esperando el Rollout de Promoción (V2)..."
          kubectl rollout status deployment/duoc-app-canary-v2 --timeout=300s
          echo "✅ Promoción Canary completada."